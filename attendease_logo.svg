<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F6E56"/>
      <stop offset="100%" stop-color="#1D9E75"/>
    </linearGradient>
  </defs>

  <!-- Rounded Square Background -->
  <rect x="40" y="40" width="432" height="432" rx="100" fill="url(#bg)"/>

  <!-- Glass Calendar Card -->
  <rect x="156" y="156" width="200" height="200" rx="28"
        fill="white" fill-opacity="0.15"
        stroke="white" stroke-opacity="0.3" stroke-width="2"/>

  <!-- Top Bar -->
  <rect x="156" y="156" width="200" height="52" rx="28"
        fill="white" fill-opacity="0.25"/>

  <!-- Binding Rings -->
  <circle cx="196" cy="156" r="6" fill="white" fill-opacity="0.9"/>
  <circle cx="316" cy="156" r="6" fill="white" fill-opacity="0.9"/>

  <!-- Highlight -->
  <ellipse cx="256" cy="210" rx="80" ry="35"
           fill="white" fill-opacity="0.08"/>

  <!-- Calendar Grid -->
  <circle cx="196" cy="250" r="4" fill="white" fill-opacity="0.3"/>
  <circle cx="236" cy="250" r="4" fill="white" fill-opacity="0.3"/>
  <circle cx="276" cy="250" r="4" fill="white" fill-opacity="0.3"/>
  <circle cx="316" cy="250" r="4" fill="white" fill-opacity="0.3"/>

  <!-- Checkmark -->
  <path 
    d="M200 280 L250 330 L330 230"
    fill="none"
    stroke="white"
    stroke-width="24"
    stroke-linecap="round"
    stroke-linejoin="round"/>

</svg>